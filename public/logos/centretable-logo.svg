<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="64" fill="#0f172a"/>
  <!-- Table top -->
  <ellipse cx="256" cy="220" rx="150" ry="40" fill="none" stroke="#22c55e" stroke-width="10"/>
  <ellipse cx="256" cy="220" rx="150" ry="40" fill="#22c55e" opacity="0.15"/>
  <!-- Table legs -->
  <line x1="160" y1="250" x2="140" y2="360" stroke="#22c55e" stroke-width="10" stroke-linecap="round"/>
  <line x1="352" y1="250" x2="372" y2="360" stroke="#22c55e" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="260" x2="256" y2="360" stroke="#22c55e" stroke-width="10" stroke-linecap="round"/>
  <!-- Plate on table -->
  <ellipse cx="256" cy="205" rx="36" ry="10" fill="none" stroke="#22c55e" stroke-width="4" opacity="0.6"/>
  <!-- Fork and knife -->
  <line x1="200" y1="185" x2="200" y2="235" stroke="#22c55e" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="312" y1="185" x2="312" y2="235" stroke="#22c55e" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- Initials -->
  <text x="256" y="445" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="56" fill="#ffffff" letter-spacing="6">CT</text>
