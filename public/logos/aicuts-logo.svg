<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="64" fill="#0f172a"/>
  <!-- Scissors -->
  <g transform="translate(256,240)">
    <!-- Left blade -->
    <ellipse cx="-60" cy="50" rx="40" ry="22" fill="none" stroke="#f59e0b" stroke-width="12" transform="rotate(-20,-60,50)"/>
    <line x1="-30" y1="35" x2="80" y2="-80" stroke="#f59e0b" stroke-width="14" stroke-linecap="round"/>
    <!-- Right blade -->
    <ellipse cx="60" cy="50" rx="40" ry="22" fill="none" stroke="#f59e0b" stroke-width="12" transform="rotate(20,60,50)"/>
    <line x1="30" y1="35" x2="-80" y2="-80" stroke="#f59e0b" stroke-width="14" stroke-linecap="round"/>
    <!-- Pivot -->
    <circle cx="0" cy="20" r="10" fill="#f59e0b"/>
  </g>
  <!-- Cut line (dashed) -->
  <line x1="80" y1="130" x2="432" y2="130" stroke="#f59e0b" stroke-width="4" stroke-dasharray="16,12" opacity="0.5"/>
  <!-- Initials -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="56" fill="#ffffff" letter-spacing="6">AC</text>
</svg>