<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="64" fill="#0f172a"/>
  <!-- Robot head -->
  <rect x="156" y="130" width="200" height="180" rx="24" fill="none" stroke="#a78bfa" stroke-width="12"/>
  <!-- Antenna -->
  <line x1="256" y1="130" x2="256" y2="80" stroke="#a78bfa" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="68" r="14" fill="#a78bfa"/>
  <!-- Eyes (X eyes = laid off) -->
  <g stroke="#a78bfa" stroke-width="10" stroke-linecap="round">
    <line x1="195" y1="195" x2="225" y2="225"/>
    <line x1="225" y1="195" x2="195" y2="225"/>
    <line x1="287" y1="195" x2="317" y2="225"/>
    <line x1="317" y1="195" x2="287" y2="225"/>
  </g>
  <!-- Sad mouth -->
  <path d="M210,275 Q256,255 302,275" fill="none" stroke="#a78bfa" stroke-width="10" stroke-linecap="round"/>
  <!-- Ears -->
  <rect x="130" y="180" width="26" height="50" rx="8" fill="#a78bfa" opacity="0.5"/>
  <rect x="356" y="180" width="26" height="50" rx="8" fill="#a78bfa" opacity="0.5"/>
  <!-- Initials -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="56" fill="#ffffff" letter-spacing="6">RL</text>
</svg>